
# Pytest Configuration for Tradov Trading System

[pytest]
# Test discovery patterns
python_files = test_*.py *_test.py TradovT*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths =
    Tradov/TradovT_Testing

# Output options
addopts =
    --verbose
    --strict-markers
    --strict-config
    --color=yes
    # Coverage options — measure all production modules
    --cov=Tradov/TradovA_Core
    --cov=Tradov/TradovB_Broker
    --cov=Tradov/TradovC_MarketData
    --cov=Tradov/TradovD_Strategies
    --cov=Tradov/TradovE_Risk
    --cov=Tradov/TradovF_Analysis
    --cov=Tradov/TradovG_GUI
    --cov=Tradov/TradovH_Storage
    --cov=Tradov/TradovI_Integration
    --cov=Tradov/TradovJ_Alerts
    --cov=Tradov/TradovK_Reports
    --cov=Tradov/TradovL_ML
    --cov=Tradov/TradovM_Monitoring
    --cov=Tradov/TradovO_TradingIntelligence
    --cov=Tradov/TradovP_PortfolioMgmt
    --cov=Tradov/TradovR_Runtime
    --cov=Tradov/TradovS_Signals
    --cov=Tradov/TradovU_Utilities
    --cov=Tradov/TradovV_QuantModels
    --cov=Tradov/TradovX_Agents
    --cov=Tradov/TradovY_AutoAgents
    --cov=Tradov/TradovZ_Communication
    --cov-report=html:htmlcov
    --cov-report=term-missing:skip-covered
    --cov-report=xml
    --cov-fail-under=60
    # Performance options
    --durations=10
    # Warnings
    -W ignore::DeprecationWarning
    -W ignore::PendingDeprecationWarning

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require external services)
    slow: Slow tests (> 1 second)
    paper: Tests requiring paper trading account
    live: Tests requiring live trading account (use with extreme caution)
    tradier: Tests requiring Tradier API credentials
    databento: Tests requiring Databento API credentials
    gui: GUI tests (require display)
    network: Tests requiring network access
    smoke: Smoke tests (quick sanity checks)
    regression: Regression tests
    manual: Manual/interactive tests — never run in CI (require human confirmation)

# Minimum Python version
minversion = 3.9

# Test timeout (prevent hanging tests)
timeout = 300

# Asyncio configuration
asyncio_mode = auto

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Ignore paths
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .venv
    venv
    archive
    htmlcov
    .pytest_cache

# Custom options
[tool:pytest]
# Additional configuration can go here
