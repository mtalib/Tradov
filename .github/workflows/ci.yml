name: Tradov CI

on:
  push:
    branches: ["master", "feature/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: ["master"]
  schedule:
    - cron: "15 6 * * *"

# Cancel in-progress runs on the same branch to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint — ruff (fast, runs first to fail early)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (errors only — includes T201 print detection)
        run: |
          ruff check Tradov/ \
            --select E,W,F,T20,B \
            --ignore E402,E501 \
            --exclude Tradov/TradovT_Testing,Tradov/TradovQ_Scripts \
            --output-format github

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Fast tests — pytest (behavior validation)
  # ─────────────────────────────────────────────────────────────────────────────
  test-fast:
    name: Test fast (pytest, no coverage gate)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-core.txt
          pip install -r requirements-dev.txt

      - name: Install trading dependencies (no heavy ML)
        run: |
          pip install -r requirements-trading.txt || true

      - name: Create required directories
        run: mkdir -p logs

      - name: Run tests (fast path, no coverage gate)
        shell: bash
        run: |
          mapfile -t CI_SAFE_TEST_ARRAY < <(
            find Tradov/TradovT_Testing -maxdepth 1 -type f \( -name 'test_*.py' -o -name '*_test.py' \) | sort
          )

          if [[ ${#CI_SAFE_TEST_ARRAY[@]} -eq 0 ]]; then
            echo "No CI-safe pytest-named tests found in Tradov/TradovT_Testing." | tee test-results.txt
            exit 1
          fi

          echo "Running CI-safe fast tests:"
          printf '%s\n' "${CI_SAFE_TEST_ARRAY[@]}"

          python -m pytest \
            --no-cov \
            --tb=short \
            --timeout=60 \
            -q \
            "${CI_SAFE_TEST_ARRAY[@]}" \
            2>&1 | tee test-results.txt

      - name: Summarise test results
        if: always()
        run: |
          tail -5 test-results.txt || true

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-fast-log
          path: test-results.txt
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: PR-focused tests — only changed test files
  # Runs on pull requests to provide very fast, scoped feedback.
  # ─────────────────────────────────────────────────────────────────────────────
  test-pr-focused:
    name: Test PR-focused (changed tests only)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-core.txt
          pip install -r requirements-dev.txt

      - name: Install trading dependencies (no heavy ML)
        run: |
          pip install -r requirements-trading.txt || true

      - name: Create required directories
        run: mkdir -p logs

      - name: Run changed tests only
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          mapfile -t CHANGED_TEST_ARRAY < <(
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '^Tradov/TradovT_Testing/.*\.py$' || true
          )

          if [[ ${#CHANGED_TEST_ARRAY[@]} -eq 0 ]]; then
            echo "No changed test files in this PR. Skipping focused pytest run." | tee test-pr-focused-results.txt
            exit 0
          fi

          mapfile -t CI_SAFE_CHANGED_TEST_ARRAY < <(
            printf '%s\n' "${CHANGED_TEST_ARRAY[@]}" | grep -E '^Tradov/TradovT_Testing/(test_.*\.py|.*_test\.py)$' || true
          )

          if [[ ${#CI_SAFE_CHANGED_TEST_ARRAY[@]} -eq 0 ]]; then
            {
              echo "Changed test files detected, but none are CI-safe pytest-named tests. Skipping focused pytest run."
              echo "Changed files:"
              printf '%s\n' "${CHANGED_TEST_ARRAY[@]}"
            } | tee test-pr-focused-results.txt
            exit 0
          fi

          echo "CI-safe changed test files:"
          printf '%s\n' "${CI_SAFE_CHANGED_TEST_ARRAY[@]}"

          python -m pytest \
            --no-cov \
            --tb=short \
            --timeout=60 \
            -q \
            "${CI_SAFE_CHANGED_TEST_ARRAY[@]}" \
            2>&1 | tee test-pr-focused-results.txt

      - name: Summarise PR-focused test results
        if: always()
        run: |
          tail -20 test-pr-focused-results.txt || true

      - name: Upload PR-focused test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-pr-focused-log
          path: test-pr-focused-results.txt
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Full coverage governance — pytest with global fail-under
  # Runs only on master pushes and nightly schedule; avoids blocking focused PRs.
  # ─────────────────────────────────────────────────────────────────────────────
  test-coverage-full:
    name: Test full (coverage gate)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-core.txt
          pip install -r requirements-dev.txt

      - name: Install trading dependencies (no heavy ML)
        run: |
          pip install -r requirements-trading.txt || true

      - name: Create required directories
        run: mkdir -p logs

      - name: Run full tests (coverage gate from pytest.ini)
        run: |
          python -m pytest \
            --tb=short \
            --timeout=120 \
            -q \
            2>&1 | tee test-coverage-results.txt

      - name: Summarise coverage run
        if: always()
        run: |
          tail -20 test-coverage-results.txt || true

      - name: Upload coverage run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-full-log
          path: test-coverage-results.txt
          retention-days: 7

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Security scan (bandit) — non-blocking, report only
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit (medium severity and above)
        shell: bash
        run: |
          bandit_exit=0
          bandit -r Tradov/ \
            --severity-level medium \
            --exclude Tradov/TradovT_Testing,Tradov/TradovQ_Scripts \
            --format txt \
            -o bandit-report.txt || bandit_exit=$?

          if [[ -f bandit-report.txt ]]; then
            cat bandit-report.txt
          fi

          if [[ $bandit_exit -eq 1 ]]; then
            echo "::warning title=Bandit findings detected::Medium-or-higher Bandit findings were reported. See the uploaded bandit-report artifact for details."
            exit 0
          fi

          if [[ $bandit_exit -ne 0 ]]; then
            echo "::error title=Bandit execution failed::Bandit exited with status $bandit_exit"
            exit "$bandit_exit"
          fi

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
          retention-days: 7
