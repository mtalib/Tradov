name: Spyder CI

on:
  push:
    branches: ["master", "feature/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: ["master"]

# Cancel in-progress runs on the same branch to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint — ruff (fast, runs first to fail early)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff (errors only — includes T201 print detection)
        run: |
          ruff check Spyder/ \
            --select E,W,F,T20,B \
            --exclude Spyder/SpyderT_Testing,Spyder/SpyderQ_Scripts \
            --output-format github

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Test — pytest
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-core.txt
          pip install -r requirements-dev.txt

      - name: Install trading dependencies (no heavy ML)
        run: |
          pip install -r requirements-trading.txt || true

      - name: Create required directories
        run: mkdir -p logs

      - name: Run tests (no coverage threshold in CI — report only)
        run: |
          python -m pytest \
            --no-cov \
            --tb=short \
            --timeout=60 \
            -q \
            2>&1 | tee test-results.txt

      - name: Summarise test results
        if: always()
        run: |
          tail -5 test-results.txt || true

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test-results.txt
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Security scan (bandit) — non-blocking, report only
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true   # non-blocking for now; tighten once baseline is clean

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit (medium severity and above)
        run: |
          bandit -r Spyder/ \
            --severity-level medium \
            --exclude Spyder/SpyderT_Testing,Spyder/SpyderQ_Scripts \
            --format txt \
            -o bandit-report.txt || true
          cat bandit-report.txt

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.txt
          retention-days: 7
