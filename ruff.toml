# Ruff linter configuration for the Spyder Trading System
# Docs: https://docs.astral.sh/ruff/

# Match the project's Python version
target-version = "py313"

# Project source layout
src = ["Spyder"]

# Files to exclude from linting
exclude = [
    ".venv",
    "__pycache__",
    ".git",
    "htmlcov",
    "build",
    "dist",
    "13-Archive",
    "11-TestScripts",
    "Spyder/SpyderF_Analysis/mock_talib.py",   # known mock file, to be moved
]

line-length = 100

[lint]
# Rule sets to enable:
#   E/W  = pycodestyle errors and warnings
#   F    = pyflakes (undefined names, unused imports, etc.)
#   T20  = flake8-print (T201 = print found, T203 = pprint found)
#   B    = flake8-bugbear (common bug patterns)
#   UP   = pyupgrade (modern Python idioms)
#   SIM  = flake8-simplify
#   ANN  = flake8-annotations (type hint enforcement)
#   F403 = wildcard imports (from X import *)
#   F405 = may be undefined from wildcard import
#   BLE  = blind exception (except Exception)
select = ["E", "W", "F", "F403", "F405", "T20", "B", "BLE", "UP", "SIM"]

# --- Rules currently ignored (large pre-existing violations, fix incrementally) ---
ignore = [
    "E501",   # line too long — not enforced yet (project has long lines throughout)
    "E402",   # module-level import not at top — some modules do deferred imports
    "B008",   # do not perform function calls in default argument values
    "B904",   # raise ... from err — not yet consistently applied
    "BLE001", # blind exception — being fixed incrementally (64+ instances)
    "SIM102", # use a single if statement — readability preference
    "SIM105", # use contextlib.suppress — style preference
    "SIM108", # ternary operator — readability preference
    "UP007",  # use X | Y instead of Optional[X] — not ready project-wide
    "ANN",    # type annotations — enabled selectively, not globally yet
]

# T20 (print detection) — the key enforcement rule.
# Allow print() ONLY inside __main__ guard blocks.
# Ruff enforces T201 globally; __main__ blocks should use the logger.
# The noqa comment # noqa: T201 can be used for intentional one-off exceptions.

[lint.per-file-ignores]
# Test files: allow print, assert statements, etc.
"Spyder/SpyderT_Testing/**" = ["T20", "B", "S", "F401"]
# Utility scripts: allow print
"Spyder/SpyderQ_Scripts/**" = ["T20"]
# __init__.py files: imports are intentional re-exports for the package API
"**/__init__.py" = ["F401"]
# Legacy demo/standalone scripts embedded in modules:
# These are in __main__ blocks and are acceptable for now.
# Use noqa: T201 in those blocks if needed.

# G05 Trading Dashboard — large GUI module with specific patterns
"Spyder/SpyderG_GUI/SpyderG05_TradingDashboard.py" = [
    # Docstring style — not enforced in GUI modules
    "D",
    # Boolean positional args — ubiquitous in Qt API calls (setVisible, setEnabled, etc.)
    "FBT",
    # f-string logging — deferred cleanup (Opp-5); suppressed project-wide via G004 eventually
    "G004",
    # random.* — intentional for simulation/fallback data display
    "S311",
    # Magic values — GUI has many literal thresholds and Qt dimension constants
    "PLR2004",
    # Qt private member access — standard PySide6 pattern (e.g. _q_animate)
    "SLF001",
    # type: ignore without specific code — required by Qt/PySide6 type stubs
    "PGH003",
    # Function complexity — large GUI event handlers by design
    "PLR0915", "PLR0912", "PLR0911", "C901",
    # Naming — Qt overrides (paintEvent, etc.) and project file-naming convention
    "N802", "N814", "N999",
    # Shebang — intentional for standalone execution
    "EXE001",
    # Exception style — acceptable variation in GUI error paths
    "TRY003", "TRY300", "TRY301",
    # logger.exception(f"...: {e}") — keeping {e} inline aids log grep-ability
    "TRY401",
    # Exception messages — f-strings acceptable in GUI exception handlers
    "EM102",
    # Unused Qt callback args — required by Qt signal signature
    "ARG002", "ARG005",
    # Import alias convention — Qt imports use conventional aliases
    "ICN001",
]
